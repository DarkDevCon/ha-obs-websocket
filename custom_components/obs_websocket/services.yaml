set_scene:
  name: Set Scene
  description: Switch to a specific scene in OBS Studio.
  fields:
    scene:
      name: Scene
      description: The name of the scene to switch to.
      required: true
      example: "Scene 1"
      selector:
        text:
    entry_id:
      name: Entry ID
      description: "Optional: target a specific OBS instance. If omitted, applies to the first matching instance."
      required: false
      example: "abc123..."
      selector:
        text:

start_streaming:
  name: Start Streaming
  description: Start streaming in OBS Studio.
  fields:
    entry_id:
      name: Entry ID
      description: "Optional: target a specific OBS instance. If omitted, starts on all instances."
      required: false
      selector:
        text:

stop_streaming:
  name: Stop Streaming
  description: Stop streaming in OBS Studio.
  fields:
    entry_id:
      name: Entry ID
      description: "Optional: target a specific OBS instance. If omitted, stops on all instances."
      required: false
      selector:
        text:

start_recording:
  name: Start Recording
  description: Start recording in OBS Studio.
  fields:
    entry_id:
      name: Entry ID
      description: "Optional: target a specific OBS instance. If omitted, starts on all instances."
      required: false
      selector:
        text:

stop_recording:
  name: Stop Recording
  description: Stop recording in OBS Studio.
  fields:
    entry_id:
      name: Entry ID
      description: "Optional: target a specific OBS instance. If omitted, stops on all instances."
      required: false
      selector:
        text:

toggle_mute:
  name: Toggle Mute
  description: Toggle mute on an audio source.
  fields:
    source:
      name: Source
      description: The name of the audio source to toggle mute.
      required: true
      example: "Microphone"
      selector:
        text:
    entry_id:
      name: Entry ID
      description: "Optional: target a specific OBS instance."
      required: false
      selector:
        text: